buildscript {
    repositories {
        google() // 🔥 Ensures Gradle can find Firebase dependencies
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.0.2' // ✅ Correct Gradle version
        classpath 'com.google.gms:google-services:4.3.15' // ✅ Google Services for Firebase
    }
}

allprojects {
    repositories {
        google() // ✅ Ensure all projects use Google & MavenCentral
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
